summary_ja: >
  NISTの任意AIリスク管理枠組み。Govern/Map/Measure/Manageと生成AIプロファイルを示す。

cells:
  - column: A
    requirement: should
    summary_ja: AIの設計・開発・利用・評価で信頼性リスク管理を促す。
    citation:
      url: https://www.nist.gov/itl/ai-risk-management-framework#main-content
      section: "Overview of the AI RMF"
      retrieved: 2026-04-20
      confidence: high
    notes_ja: >
      任意利用の枠組みであり、医療AI専用ではなくAI製品・サービス・システム全般を対象にする。

  - column: B
    requirement: should
    summary_ja: 文脈に応じてリスク許容度、優先度、影響を評価する。
    citation:
      url: https://nvlpubs.nist.gov/nistpubs/ai/NIST.AI.100-1.pdf#page=32
      section: "Section 3; MAP 4-5; MANAGE 1"
      retrieved: 2026-04-20
      confidence: high
    notes_ja: >
      法的クラス分類ではなく、組織の文脈・影響・リスク許容度に基づくリスクベース管理。

  - column: C
    requirement: should
    summary_ja: 透明性、説明可能性、解釈可能性を信頼性特性に含める。
    citation:
      url: https://nvlpubs.nist.gov/nistpubs/ai/NIST.AI.100-1.pdf#page=35
      section: "Section 4; MEASURE 2.8"
      retrieved: 2026-04-20
      confidence: high
    notes_ja: >
      Generative AI Profileも来歴、生成物透明性、文書化のプロセスを扱う。

  - column: D
    requirement: should
    summary_ja: 文書化、インベントリ、来歴、監視結果の記録を求める。
    citation:
      url: https://nvlpubs.nist.gov/nistpubs/ai/NIST.AI.600-1.pdf#page=20
      section: "GOVERN 1.5-1.6; MEASURE 2.8"
      retrieved: 2026-04-20
      confidence: high
    notes_ja: >
      生成AIプロファイルはデータ来歴、インシデント監視、改変履歴の追跡可能性を具体化する。

  - column: E
    requirement: should
    summary_ja: 人間判断とHuman-AI構成の役割を明確化する。
    citation:
      url: https://nvlpubs.nist.gov/nistpubs/ai/NIST.AI.600-1.pdf#page=30
      section: "GOVERN 3.2; MAP 3.4"
      retrieved: 2026-04-20
      confidence: high
    notes_ja: >
      自動化バイアス、過信、擬人化など人間とAIの相互作用リスクを扱う。

  - column: F
    requirement: should
    summary_ja: 公平性、有害バイアス、データ代表性を測定・管理する。
    citation:
      url: https://nvlpubs.nist.gov/nistpubs/ai/NIST.AI.100-1.pdf#page=23
      section: "Section 4; MEASURE 2.11"
      retrieved: 2026-04-20
      confidence: high
    notes_ja: >
      AI RMFは公平性と有害バイアス管理を信頼性特性に含める。

  - column: G
    requirement: should
    summary_ja: 展開後監視、改善、事故・エラー連絡を管理機能に含める。
    citation:
      url: https://nvlpubs.nist.gov/nistpubs/ai/NIST.AI.100-1.pdf#page=38
      section: "MANAGE 4.1-4.3"
      retrieved: 2026-04-20
      confidence: high
    notes_ja: >
      PCCP固有用語ではないが、展開後の監視計画と継続改善を扱う。

  - column: H
    requirement: should
    summary_ja: 役割、責任、説明責任メカニズムを組織に求める。
    citation:
      url: https://nvlpubs.nist.gov/nistpubs/ai/NIST.AI.100-1.pdf#page=28
      section: "GOVERN 2.1-2.3; Section 3.4"
      retrieved: 2026-04-20
      confidence: high
    notes_ja: >
      組織コミットメント、責任、意思決定ラインをAIリスク管理の前提とする。

  - column: I
    requirement: should
    summary_ja: プライバシー強化と同意等の生成AIプライバシーリスクを扱う。
    citation:
      url: https://nvlpubs.nist.gov/nistpubs/ai/NIST.AI.600-1.pdf#page=24
      section: "GAI Risks: Data Privacy; MEASURE 2.10"
      retrieved: 2026-04-20
      confidence: high
    notes_ja: >
      個人データ、目的特定、個人参加、同意、機微データ露出をリスクとして扱う。

  - column: J
    requirement: should
    summary_ja: セキュアでレジリエントなAIと情報セキュリティを評価する。
    citation:
      url: https://nvlpubs.nist.gov/nistpubs/ai/NIST.AI.600-1.pdf#page=21
      section: "GAI Risks: Information Security; MEASURE 2.7"
      retrieved: 2026-04-20
      confidence: high
    notes_ja: >
      プロンプト注入、データポイズニング、モデル抽出等の生成AI脅威も含む。

  - column: K
    requirement: should
    summary_ja: TEVV、妥当性、信頼性、性能限界を測定・文書化する。
    citation:
      url: https://nvlpubs.nist.gov/nistpubs/ai/NIST.AI.100-1.pdf#page=34
      section: "MEASURE 2.1-2.6"
      retrieved: 2026-04-20
      confidence: high
    notes_ja: >
      医療AI固有の臨床評価ではないが、試験・評価・検証・妥当性確認を扱う。

  - column: L
    requirement: mention
    summary_ja: 他のリスク管理努力との整合と国際的利用を意図する。
    citation:
      url: https://www.nist.gov/itl/ai-risk-management-framework#main-content
      section: "Overview of the AI RMF; AIRC"
      retrieved: 2026-04-20
      confidence: high
    notes_ja: >
      NISTページはAI RMFが他者のAIリスク管理努力と整合・支援することを説明する。

  - column: M
    requirement: should
    summary_ja: Govern/Map/Measure/ManageをAIライフサイクル全体に適用する。
    citation:
      url: https://nvlpubs.nist.gov/nistpubs/ai/NIST.AI.100-1.pdf#page=26
      section: "Section 5; Tables 1-4"
      retrieved: 2026-04-20
      confidence: high
    notes_ja: >
      GOVERNは全段階、MAP/MEASURE/MANAGEは各ライフサイクル段階で適用可能とされる。
