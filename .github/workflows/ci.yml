name: CI

"on":
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install yamllint -r requirements.txt
      - run: >
          yamllint
          -d "{extends: relaxed, rules: {line-length: disable}}"
          corpus .github/workflows/ci.yml
      - run: python scripts/validate_corpus.py

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt
      - run: python scripts/build_site.py
      - run: mkdocs build --strict -f site/mkdocs.yml

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt
      - run: python scripts/build_site.py
      - run: mkdocs gh-deploy --force -f site/mkdocs.yml

  monthly-url-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install pyyaml
      - run: python scripts/check_urls.py --strict
